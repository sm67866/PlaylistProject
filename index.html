<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>a little playlist ✨</title>

<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: Comfortaa, sans-serif;
  background: linear-gradient(-45deg,#2b1055,#7597de,#e0a3ff,#ffb6c1);
  background-size: 400% 400%;
  animation: gradient 15s ease infinite;
  color: white;
}

@keyframes gradient {
  0% {background-position:0% 50%;}
  50% {background-position:100% 50%;}
  100% {background-position:0% 50%;}
}

.card {
  width: 340px;
  padding: 25px;
  border-radius: 20px;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(15px);
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

h1 {
  font-size: 18px;
  margin-bottom: 10px;
}

#title {
  font-size: 14px;
  margin: 10px 0;
  opacity: 0.9;
}

audio {
  width: 100%;
  margin-top: 10px;
}

button {
  border: none;
  padding: 8px 12px;
  margin: 5px;
  border-radius: 20px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="card">
  <h1>✨ a little playlist ✨</h1>

  <div id="title">Ready</div>

  <audio id="player" controls></audio>

  <div>
    <button onclick="prev()">⏮</button>
    <button onclick="play()">▶</button>
    <button onclick="pause()">⏸</button>
    <button onclick="next()">⏭</button>
  </div>
</div>

<script>
const songs = [
  "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
  "music/song1.mp3",
  "music/song2.mp3",
  "music/song3.mp3",
  "music/song4.mp3",
  "music/song5.mp3",
  "music/song6.mp3",
  "music/song7.mp3",
  "music/song8.mp3",
  "music/song9.mp3"
];

let current = 0;

const audio = document.getElementById("player");
const title = document.getElementById("title");

function load(i) {
  current = i;
  audio.src = songs[i];
  title.innerText = "Song " + (i + 1);
}

function play() {
  audio.play();
}

function pause() {
  audio.pause();
}

function next() {
  load((current + 1) % songs.length);
  audio.play();
}

function prev() {
  load((current - 1 + songs.length) % songs.length);
  audio.play();
}

load(0);
</script>

</body>
</html>
