<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>a little playlist ✨</title>

<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: Comfortaa, sans-serif;
  background: linear-gradient(-45deg,#2b1055,#7597de,#e0a3ff,#ffb6c1);
  background-size: 400% 400%;
  animation: gradient 15s ease infinite;
  color: white;
}

@keyframes gradient {
  0% {background-position:0% 50%;}
  50% {background-position:100% 50%;}
  100% {background-position:0% 50%;}
}

.card {
  width: 340px;
  padding: 25px;
  border-radius: 20px;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(15px);
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

h1 {
  font-size: 18px;
  margin-bottom: 10px;
}

#title {
  font-size: 13px;
  margin: 10px 0;
  opacity: 0.9;
}

button {
  border: none;
  padding: 8px 12px;
  margin: 5px;
  border-radius: 20px;
  cursor: pointer;
}

iframe {
  width: 100%;
  height: 200px;
  border-radius: 12px;
  border: none;
}
</style>
</head>

<body>

<div class="card">
  <h1>✨ a little playlist ✨</h1>

  <div id="title">Loading...</div>

  <iframe id="player"></iframe>

  <div>
    <button onclick="prev()">⏮</button>
    <button onclick="play()">▶</button>
    <button onclick="next()">⏭</button>
  </div>
</div>

<script>
const songs = [
  "ImKY6TZEyrI",
  "E7-jiktiwPg",
  "wVzvXW9bo5U"
];

let current = 0;

function load(i) {
  current = i;

  document.getElementById("player").src =
    "https://www.youtube.com/embed/" + songs[i] + "?autoplay=1&rel=0";

  document.getElementById("title").innerText =
    "Song " + (i + 1);
}

function next() {
  load((current + 1) % songs.length);
}

function prev() {
  load((current - 1 + songs.length) % songs.length);
}

function play() {
  load(current);
}

load(0);
</script>

</body>
</html>
