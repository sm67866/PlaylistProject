<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>a little playlist ✨</title>

<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;600&display=swap" rel="stylesheet">

<style>
<body style="margin:0; display:flex; align-items:center; justify-content:center; height:100vh; background:linear-gradient(-45deg,#2b1055,#7597de,#e0a3ff,#ffb6c1); background-size:400% 400%; animation:gradient 15s ease infinite;">

<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;600&display=swap" rel="stylesheet">

<div style="
    font-family: Comfortaa, sans-serif;
    color:white;
    text-align:center;
    width:90%;
    max-width:600px;
    backdrop-filter: blur(12px);
    background: rgba(255,255,255,0.1);
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
">
    <h2>✨ a little playlist ✨</h2>

    <iframe
        width="100%"
        height="315"
        src="https://www.youtube.com/embed/videoseries?list=PLM4XpluqhnrU&autoplay=1&rel=0"
        frameborder="0"
        allow="autoplay; encrypted-media"
        allowfullscreen>
    </iframe>

</div>

</body>

<body>
<div class="sparkles"></div>

<div class="player">
    <h1>✨ a little playlist ✨</h1>

    <div id="title">Loading...</div>

    <div class="controls">
        <button onclick="prevVideo()">⏮</button>
        <button onclick="playVideo()">▶</button>
        <button onclick="pauseVideo()">⏸</button>
        <button onclick="nextVideo()">⏭</button>
    </div>

    <iframe id="yt" src=""></iframe>
</div>

<div id="player"></div>

<script>
const playlistId = "PLM4XpluqhnrU";

document.getElementById("player").innerHTML = `
<iframe
  width="100%"
  height="200"
  src="https://www.youtube.com/embed/videoseries?list=${playlistId}&autoplay=1&rel=0"
  frameborder="0"
  allow="autoplay; encrypted-media"
  allowfullscreen>
</iframe>
`;
</script>
</body>
</html>
