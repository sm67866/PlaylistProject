<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>a little playlist ✨</title>

<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: "Comfortaa", sans-serif;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: linear-gradient(-45deg, #2b1055, #7597de, #e0a3ff, #ffb6c1);
    background-size: 400% 400%;
    animation: gradient 15s ease infinite;
}

@keyframes gradient {
    0% {background-position:0% 50%;}
    50% {background-position:100% 50%;}
    100% {background-position:0% 50%;}
}

.sparkles::before {
    content: "✦ ✧ ✦ ✧ ✦ ✧ ✦ ✧ ✦";
    position: absolute;
    top: 10%;
    left: 10%;
    opacity: 0.2;
    animation: float 6s infinite ease-in-out;
}

@keyframes float {
    0%,100% {transform: translateY(0);}
    50% {transform: translateY(-20px);}
}

.player {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    padding: 30px;
    width: 320px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

h1 {
    font-size: 18px;
    margin-bottom: 20px;
}

#title {
    font-size: 14px;
    margin: 15px 0;
    opacity: 0.9;
}

.controls button {
    background: white;
    border: none;
    border-radius: 50px;
    padding: 10px 14px;
    margin: 5px;
    cursor: pointer;
    font-size: 14px;
}

.controls button:hover {
    transform: scale(1.05);
}
iframe {
    width: 0;
    height: 0;
    border: none;
}
</style>
</head>

<body>
<div class="sparkles"></div>

<div class="player">
    <h1>✨ a little playlist ✨</h1>

    <div id="title">Loading...</div>

    <div class="controls">
        <button onclick="prevVideo()">⏮</button>
        <button onclick="playVideo()">▶</button>
        <button onclick="pauseVideo()">⏸</button>
        <button onclick="nextVideo()">⏭</button>
    </div>

    <iframe id="yt" src=""></iframe>
</div>

<script>
const playlistId = "PLM4XpluqhnrU";

let videos = [];
let current = 0;
let player;

async function loadPlaylist() {
    const res = await fetch(`https://www.youtube.com/playlist?list=${playlistId}`);
    const text = await res.text();

    const matches = [...text.matchAll(/"videoId":"(.*?)".*?"title":"(.*?)"/g)];

    const seen = new Set();
    videos = matches
        .map(m => ({ id: m[1], title: m[2] }))
        .filter(v => {
            if (seen.has(v.id)) return false;
            seen.add(v.id);
            return true;
        });

    if (videos.length) loadVideo(0);
}

function loadVideo(i) {
    current = i;
    const video = videos[i];

    document.getElementById("title").innerText = video.title;

    document.getElementById("yt").src =
        `https://www.youtube.com/embed/${video.id}?autoplay=1&enablejsapi=1`;
}

function nextVideo() {
    current = (current + 1) % videos.length;
    loadVideo(current);
}

function prevVideo() {
    current = (current - 1 + videos.length) % videos.length;
    loadVideo(current);
}

function playVideo() {
    document.getElementById("yt").contentWindow.postMessage(
        '{"event":"command","func":"playVideo","args":""}', "*"
    );
}

function pauseVideo() {
    document.getElementById("yt").contentWindow.postMessage(
        '{"event":"command","func":"pauseVideo","args":""}', "*"
    );
}

loadPlaylist();
</script>
</body>
</html>
